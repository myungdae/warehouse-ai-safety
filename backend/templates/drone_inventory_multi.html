<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚁 Multi-Drone Inventory System — Samsung Semiconductor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }
        
        .app-container {
            max-width: 1600px;
            margin: 0 auto;
        }
        
        .header {
            background: rgba(15,23,42,0.8);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(99,102,241,0.2);
        }
        
        .header h1 {
            font-size: 1.5rem;
            color: #6366f1;
            margin-bottom: 8px;
        }
        
        .header p {
            color: #94a3b8;
            font-size: 0.85rem;
        }
        
        .stats-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            flex: 1;
            background: rgba(15,23,42,0.8);
            border-radius: 10px;
            padding: 15px;
            border: 1px solid rgba(99,102,241,0.15);
        }
        
        .stat-label {
            font-size: 0.7rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: #e2e8f0;
        }
        
        .patrol-layout {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .map-panel {
            background: rgba(15,23,42,0.8);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(99,102,241,0.2);
        }
        
        .map-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        
        .map-title {
            font-size: 1rem;
            font-weight: 700;
            color: #e2e8f0;
        }
        
        .map-controls {
            display: flex;
            gap: 8px;
        }
        
        .btn-start {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(99,102,241,0.15);
            color: #a5b4fc;
            border: 1px solid rgba(99,102,241,0.3);
        }
        
        .btn-start.go {
            background: rgba(34,211,238,0.15);
            color: #22d3ee;
            border-color: rgba(34,211,238,0.4);
        }
        
        .btn-start:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99,102,241,0.2);
        }
        
        .dock-status-card {
            background: rgba(15,23,42,0.6);
            border-radius: 8px;
            padding: 10px 12px;
            border-left: 3px solid #6366f1;
        }
        
        svg {
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
        }
        
        #liveFeed {
            background: rgba(15,23,42,0.6);
            border-radius: 8px;
            padding: 12px;
            max-height: 250px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.7rem;
            line-height: 1.6;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .feed-item {
            padding: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        
        .feed-system { color: #22d3ee; }
        .feed-scan { color: #34d399; }
        .feed-agent { color: #fbbf24; }
        .feed-alert { color: #f87171; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(15,23,42,0.5); }
        ::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.3); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(99,102,241,0.5); }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>🚁 Multi-Drone Inventory Intelligence System</h1>
            <p>Samsung Semiconductor Warehouse — 15 Aisles × 20 Racks × 15 Levels | 9 Drones across 3 Docks</p>
        </div>
        
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-label">Total Drones</div>
                <div class="stat-value" style="color:#22d3ee">9</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Active Docks</div>
                <div class="stat-value" style="color:#34d399">3</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Scanned Racks</div>
                <div class="stat-value" id="totalScanned">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Coverage</div>
                <div class="stat-value" id="coveragePct">0%</div>
            </div>
            <div class="stat-card" style="cursor:pointer" onclick="showSummaryReport()">
                <div class="stat-label">📊 Report</div>
                <div class="stat-value" style="font-size:0.8rem;color:#fbbf24">View Summary</div>
            </div>
        </div>
        
        <div id="dashboardContent"></div>
    </div>
    
    <script src="/static/js/drone_inventory_multi.js"></script>
</body>
</html>
