<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔌 Tethered Drone System — Samsung Semiconductor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }
        
        .app-container {
            max-width: 1600px;
            margin: 0 auto;
        }
        
        .header {
            background: rgba(15,23,42,0.8);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(99,102,241,0.2);
        }
        
        .header h1 {
            font-size: 1.5rem;
            color: #6366f1;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header p {
            color: #94a3b8;
            font-size: 0.85rem;
        }
        
        .badge {
            background: linear-gradient(135deg, #22d3ee 0%, #6366f1 100%);
            color: #fff;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        
        .stats-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            flex: 1;
            background: rgba(15,23,42,0.8);
            border-radius: 8px;
            padding: 12px;
            border: 1px solid rgba(99,102,241,0.2);
        }
        
        .stat-label {
            font-size: 0.7rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        
        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #22d3ee;
        }
        
        .patrol-layout {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .map-panel {
            background: rgba(15,23,42,0.6);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(99,102,241,0.2);
        }
        
        .map-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(99,102,241,0.2);
        }
        
        .map-title {
            font-size: 1rem;
            font-weight: 700;
            color: #e2e8f0;
        }
        
        .map-controls {
            display: flex;
            gap: 8px;
        }
        
        .btn-start {
            background: rgba(99,102,241,0.15);
            color: #a5b4fc;
            border: 1px solid rgba(99,102,241,0.3);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .btn-start:hover {
            background: rgba(99,102,241,0.25);
            border-color: rgba(99,102,241,0.5);
        }
        
        .btn-start.go {
            background: linear-gradient(135deg, #34d399 0%, #22d3ee 100%);
            color: #fff;
            border: none;
        }
        
        .btn-start.go:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(34,211,238,0.3);
        }
        
        .dock-card {
            transition: all 0.3s;
        }
        
        .dock-card:hover {
            background: rgba(15,23,42,0.8) !important;
            transform: translateX(3px);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>
                🔌 Tethered Drone Inventory System
                <span class="badge">WIRED POWER</span>
            </h1>
            <p>Samsung Semiconductor Warehouse — 15 Aisles × 20 Racks × 15 Levels | 2 Docks (No Battery)</p>
        </div>
        
        <div class="stats-bar">
            <div class="stat-card" style="cursor:pointer" onclick="switchDay(state.currentDay === 1 ? 2 : 1)">
                <div class="stat-label">Current Day</div>
                <div class="stat-value" id="currentDay" style="color:#22d3ee">Day 1</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Drones</div>
                <div class="stat-value" style="color:#a78bfa">2</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Scanned Items</div>
                <div class="stat-value" id="totalScanned">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Coverage</div>
                <div class="stat-value" id="coveragePct">0%</div>
            </div>
            <div class="stat-card" style="cursor:pointer;transition:all 0.3s" onclick="showCompareView()" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='translateY(0)'" id="compareCard">
                <div class="stat-label">📊 ERP Compare</div>
                <div class="stat-value" style="font-size:0.9rem;color:#fbbf24">Day1 vs Day2</div>
            </div>
        </div>
        
        <div id="dashboardContent"></div>
    </div>
    
    <script src="/static/js/drone_tethered.js"></script>
</body>
</html>
